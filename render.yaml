services:
  - type: web
    name: plant-disease-detection
    env: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: TF_CPP_MIN_LOG_LEVEL
        value: "3"
